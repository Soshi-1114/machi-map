name: Data Update (annual / e-Stat + NLNI + CFA)

# 年次更新（CFA Excel 公開後を想定して 3 月）。
# 全国まとめ取得方式: 人口/家賃(e-Stat)と待機児童(CFA)は全国を1回でまとめ取得、
# 地価(L01)は県別 zip のため逐次取得。1ジョブで data/*.json を生成し単一 PR を自動作成。
# （旧: 県別47ジョブが各自 e-Stat へ接続 → 毎回2-3県が接続タイムアウト＋CFAを47回DL。
#  本方式で接続バースト・冗長 DL・push レースをまとめて解消）。
# preview への反映が必要な時は Deploy Preview ワークフローを手動実行する。
on:
  schedule:
    # 3/15 深夜（UTC 19:00 = JST 04:00）
    - cron: "0 19 14 3 *"
  workflow_dispatch:
    inputs:
      pref:
        description: "対象都道府県 slug (省略で全 pref)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: data-update-annual
  cancel-in-progress: false

env:
  # こども家庭庁 待機児童 Excel URL（年度更新時に手動で書き換え）
  # 令和7年(2025-04-01)版「（参考）資料1～6」= _r7_02.xlsx（fetch-waitlist が読む
  # シート「資料６－１/６－２」を含む。採番は年度で変わるためラベルで選ぶこと）
  CFA_XLSX_URL: "https://www.cfa.go.jp/assets/contents/node/basic_page/field_ref_resources/b0a8057b-34bf-4c20-84fb-ae592708ca9b/1a728dcc/20250828_policies_hoiku_torimatome_r7_02.xlsx"
  # 国土数値情報 L01 地価公示の年度（年度ごとに書換。VERSION=zip 版、ASOF=出典表示の年。必ず同期）
  L01_VERSION: "26"
  L01_ASOF: "2026"
  # 国土地理院「指定緊急避難場所データ」全国版 zip の URL と基準時点（公開更新時に手動で書換）。
  # 空のままだと避難場所ステップはスキップ（警告のみ）。取得元 URL は docs/data-update.md §9 参照。
  GSI_SHELTER_URL: ""
  GSI_SHELTER_ASOF: "2025"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: スコープ決定（pref 入力 or 全県）
        id: scope
        run: |
          if [[ -n "${{ inputs.pref }}" ]]; then
            echo "estat=--pref=${{ inputs.pref }}" >> "$GITHUB_OUTPUT"
            echo "prefs=${{ inputs.pref }}" >> "$GITHUB_OUTPUT"
          else
            echo "estat=--all" >> "$GITHUB_OUTPUT"
            echo "prefs=$(node -e 'import("./scripts/_lib/prefs.mjs").then(m=>console.log(Object.keys(m.PREFS).join(" ")))')" >> "$GITHUB_OUTPUT"
          fi

      - name: 待機児童 Excel を取得（全国1回）
        run: curl -sL -o /tmp/cfa_waitlist.xlsx "${{ env.CFA_XLSX_URL }}"

      - name: 人口（e-Stat 全国一括）
        run: node scripts/fetch-population-2025.mjs ${{ steps.scope.outputs.estat }}
        env:
          ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID }}

      - name: 家賃（e-Stat 全国一括）
        run: node scripts/fetch-rent.mjs ${{ steps.scope.outputs.estat }}
        env:
          ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID }}

      - name: 待機児童（CFA 全国一括）
        run: WAITLIST_XLSX=/tmp/cfa_waitlist.xlsx node scripts/fetch-waitlist.mjs ${{ steps.scope.outputs.estat }}

      - name: 地価（L01 県別 zip・逐次, DL リトライ＋県別失敗は警告で継続）
        run: |
          for pref in ${{ steps.scope.outputs.prefs }}; do
            code=$(node -e "import('./scripts/_lib/prefs.mjs').then(m=>console.log(m.getPref('$pref').code))")
            url="https://nlftp.mlit.go.jp/ksj/gml/data/L01/L01-${L01_VERSION}/L01-${L01_VERSION}_${code}_GML.zip"
            ok=""
            for i in 1 2 3; do
              if curl -fsSL -o /tmp/l01.zip "$url"; then ok=1; break; fi
              echo "L01 DL retry $i: $pref"; sleep 3
            done
            if [[ -z "$ok" ]]; then echo "::warning::L01 download failed for $pref"; continue; fi
            rm -rf /tmp/l01 && unzip -oq /tmp/l01.zip -d /tmp/l01
            GEOJSON="/tmp/l01/L01-${L01_VERSION}_${code}_GML/L01-${L01_VERSION}_${code}.geojson"
            L01_GEOJSON="$GEOJSON" node scripts/fetch-land-price.mjs --pref="$pref" || echo "::warning::land price failed for $pref"
          done

      - name: 指定緊急避難場所（国土地理院 全国版CSV・全国一括）
        run: |
          if [[ -z "${GSI_SHELTER_URL}" ]]; then
            echo "::warning::GSI_SHELTER_URL 未設定のため避難場所更新をスキップ（docs/data-update.md §9）"
            exit 0
          fi
          ok=""
          for i in 1 2 3; do
            if curl -fsSL -o /tmp/hinanbasho.zip "${GSI_SHELTER_URL}"; then ok=1; break; fi
            echo "GSI shelter DL retry $i"; sleep 3
          done
          if [[ -z "$ok" ]]; then echo "::warning::GSI shelter download failed"; exit 0; fi
          rm -rf /tmp/hinanbasho && unzip -oq /tmp/hinanbasho.zip -d /tmp/hinanbasho
          CSV=$(find /tmp/hinanbasho -iname '*.csv' | head -1)
          if [[ -z "$CSV" ]]; then echo "::warning::shelter CSV not found in zip"; exit 0; fi
          GSI_SHELTER_CSV="$CSV" node --max-old-space-size=4096 scripts/fetch-shelters.mjs ${{ steps.scope.outputs.estat }} \
            || echo "::warning::fetch-shelters failed"

      - name: 差分があれば単一 PR を作成
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --porcelain data/)" ]]; then
            echo "差分なし。PR は作成しない。"
            exit 0
          fi
          BRANCH="data/annual-${{ github.run_id }}"
          git switch -c "$BRANCH"
          git add data/
          git commit -m "chore(data): annual estat/nlni/cfa update (run ${{ github.run_id }})"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore(data): 年次データ更新 (e-Stat / NLNI L01 / CFA)" \
            --body "annual ワークフロー (run ${{ github.run_id }}) による年次データ更新。人口/家賃/待機児童を全国一括取得、地価を県別取得して集約した単一 PR です。マージ後、必要なら Deploy Preview を手動実行してください。"
