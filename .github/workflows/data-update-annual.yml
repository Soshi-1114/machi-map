name: Data Update (annual / e-Stat + NLNI + CFA)

# 年次更新（CFA Excel 公開後を想定して 3 月初旬）。
# - e-Stat: 国勢調査 (人口) / 住宅・土地統計 (家賃)
# - NLNI L01: 地価公示
# - CFA Excel: 待機児童
# データ取得と main への commit のみ行う。preview への反映が必要な時は
# Deploy Preview ワークフローを手動実行する（自動 deploy はデプロイ数抑制のため廃止）。
on:
  schedule:
    # 3/15 深夜（UTC 19:00 = JST 04:00）
    - cron: "0 19 14 3 *"
  workflow_dispatch:
    inputs:
      pref:
        description: "対象都道府県 slug (省略で全 pref)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: data-update-annual
  cancel-in-progress: false

env:
  # こども家庭庁 待機児童 Excel URL（年度更新時に手動で書き換え）
  # 令和7年(2025-04-01)版「（参考）資料1～6」= _r7_02.xlsx（fetch-waitlist が読む
  # シート「資料６－１/６－２」を含む。採番は年度で変わるためラベルで選ぶこと）
  CFA_XLSX_URL: "https://www.cfa.go.jp/assets/contents/node/basic_page/field_ref_resources/b0a8057b-34bf-4c20-84fb-ae592708ca9b/1a728dcc/20250828_policies_hoiku_torimatome_r7_02.xlsx"
  # 国土数値情報 L01 地価公示の年度バージョン（年度ごとに書換）
  L01_VERSION: "26"

jobs:
  resolve-prefs:
    runs-on: ubuntu-latest
    outputs:
      prefs: ${{ steps.set.outputs.prefs }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          input="${{ inputs.pref }}"
          if [[ -n "$input" ]]; then
            echo "prefs=[\"$input\"]" >> "$GITHUB_OUTPUT"
          else
            list=$(node -e 'import("./scripts/_lib/prefs.mjs").then(m=>console.log(JSON.stringify(Object.keys(m.PREFS))))')
            echo "prefs=$list" >> "$GITHUB_OUTPUT"
          fi

  fetch:
    needs: resolve-prefs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        pref: ${{ fromJson(needs.resolve-prefs.outputs.prefs) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Read pref code
        id: prefmeta
        run: |
          code=$(node -e 'import("./scripts/_lib/prefs.mjs").then(m=>console.log(m.getPref("${{ matrix.pref }}").code))')
          echo "code=$code" >> "$GITHUB_OUTPUT"

      - name: Download NLNI L01 (${{ steps.prefmeta.outputs.code }})
        run: |
          mkdir -p /tmp/l01
          curl -sL -o /tmp/l01.zip \
            "https://nlftp.mlit.go.jp/ksj/gml/data/L01/L01-${{ env.L01_VERSION }}/L01-${{ env.L01_VERSION }}_${{ steps.prefmeta.outputs.code }}_GML.zip"
          unzip -o /tmp/l01.zip -d /tmp/l01

      - name: Download CFA waitlist xlsx
        run: curl -sL -o /tmp/cfa_waitlist.xlsx "${{ env.CFA_XLSX_URL }}"

      - name: Fetch population (e-Stat)
        run: node scripts/fetch-population-2025.mjs --pref=${{ matrix.pref }}
        env:
          ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID }}

      - name: Fetch rent (e-Stat)
        run: node scripts/fetch-rent.mjs --pref=${{ matrix.pref }}
        env:
          ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID }}

      - name: Fetch land price (NLNI L01)
        run: |
          # NLNI zip 解凍後のパスは L01-{ver}_{code}_GML/L01-{ver}_{code}.geojson
          GEOJSON="/tmp/l01/L01-${{ env.L01_VERSION }}_${{ steps.prefmeta.outputs.code }}_GML/L01-${{ env.L01_VERSION }}_${{ steps.prefmeta.outputs.code }}.geojson"
          L01_GEOJSON="$GEOJSON" node scripts/fetch-land-price.mjs --pref=${{ matrix.pref }}

      - name: Fetch waitlist (CFA Excel)
        run: WAITLIST_XLSX=/tmp/cfa_waitlist.xlsx node scripts/fetch-waitlist.mjs --pref=${{ matrix.pref }}

      - name: Detect diff & commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/${{ matrix.pref }}.json data/${{ matrix.pref }}_wards.json 2>/dev/null)" ]]; then
            git add data/${{ matrix.pref }}.json data/${{ matrix.pref }}_wards.json 2>/dev/null || true
            git commit -m "chore(data): ${{ matrix.pref }} annual estat/nlni/cfa update"
            # 並列 job が同時に main へ push するため、rebase + push をリトライ（レース対策）
            pushed=""
            for i in $(seq 1 8); do
              if git pull --rebase origin main && git push origin HEAD:main; then pushed=1; break; fi
              echo "push attempt $i failed (likely concurrent push); retrying..."
              sleep $(( (RANDOM % 6) + 2 ))
            done
            if [[ -z "$pushed" ]]; then echo "::error::push failed after retries for ${{ matrix.pref }}"; exit 1; fi
          else
            echo "No data diff for ${{ matrix.pref }}"
          fi
