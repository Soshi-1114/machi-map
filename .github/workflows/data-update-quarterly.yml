name: Data Update (quarterly / reinfolib)

# reinfolib 由来データ（災害リスク + 駅・保育・医療）を四半期ごとに更新。
# 各県を並列 fetch → アーティファクト化 → 集約ジョブ(open-pr)が全県分をまとめて
# 単一 PR を自動作成する（旧: 各県が main へ直 push → 並列レースで失敗するため変更）。
# preview への反映が必要な時は Deploy Preview ワークフローを手動実行する。
on:
  schedule:
    # 1/1・4/1・7/1・10/1 の 04:00 JST（= 各前日 19:00 UTC）。
    # 月末日が異なるため2本に分割（6月/9月は31日が無く単一 cron では発火しないため）。
    - cron: "0 19 31 12,3 *"   # 12/31・3/31 UTC → 1/1・4/1 JST
    - cron: "0 19 30 6,9 *"    # 6/30・9/30 UTC → 7/1・10/1 JST
  workflow_dispatch:
    inputs:
      pref:
        description: "対象都道府県の slug (省略時は全 pref)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: data-update-quarterly
  cancel-in-progress: false

jobs:
  resolve-prefs:
    runs-on: ubuntu-latest
    outputs:
      prefs: ${{ steps.set.outputs.prefs }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        # workflow_dispatch 入力は信頼境界の外。${{ }} を run: に直接展開せず env 経由で
        # 受け取り、英小文字スラッグ（^[a-z]+$）に厳格検証してからのみ使用する
        # （シェルインジェクション防止）。
        env:
          PREF_INPUT: ${{ inputs.pref }}
        run: |
          input="$PREF_INPUT"
          if [[ -n "$input" ]]; then
            if [[ ! "$input" =~ ^[a-z]+$ ]]; then
              echo "::error::invalid pref slug (allowed: ^[a-z]+$): '$input'"; exit 1
            fi
            echo "prefs=[\"$input\"]" >> "$GITHUB_OUTPUT"
          else
            # scripts/_lib/prefs.mjs から slug を抽出（key 名）
            list=$(node -e 'import("./scripts/_lib/prefs.mjs").then(m=>console.log(JSON.stringify(Object.keys(m.PREFS))))')
            echo "prefs=$list" >> "$GITHUB_OUTPUT"
          fi

  fetch:
    needs: resolve-prefs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3       # reinfolib API 過負荷防止
      matrix:
        pref: ${{ fromJson(needs.resolve-prefs.outputs.prefs) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Restore reinfolib tile cache (${{ matrix.pref }})
        uses: actions/cache@v4
        with:
          path: .cache/reinfolib-tiles/${{ matrix.pref }}
          key: reinfolib-tiles-${{ matrix.pref }}-v1

      - name: Fetch hazard (XKT026/029)
        run: node --max-old-space-size=4096 scripts/fetch-hazard.mjs --pref="$PREF"
        env:
          PREF: ${{ matrix.pref }}
          REINFOLIB_API_KEY: ${{ secrets.REINFOLIB_API_KEY }}

      - name: Fetch amenities (XKT015/007/010)
        run: node --max-old-space-size=4096 scripts/fetch-amenities.mjs --pref="$PREF"
        env:
          PREF: ${{ matrix.pref }}
          REINFOLIB_API_KEY: ${{ secrets.REINFOLIB_API_KEY }}

      # main へは push せず、変更後データをアーティファクトに退避（集約ジョブが回収）。
      - name: Upload fetched data
        uses: actions/upload-artifact@v4
        with:
          name: data-${{ matrix.pref }}
          path: |
            data/${{ matrix.pref }}.json
            data/${{ matrix.pref }}_wards.json
          if-no-files-found: ignore
          retention-days: 1

  # 全 fetch ジョブのアーティファクトを回収し、全県分の差分を1コミットにまとめて単一 PR を作成。
  open-pr:
    needs: fetch
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all pref data artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/incoming
          pattern: data-*
          merge-multiple: true

      - name: Apply fetched data into data/
        run: |
          mkdir -p data
          find /tmp/incoming -name '*.json' -exec cp {} data/ \; 2>/dev/null || true
          echo "変更ファイル:"; git status --porcelain data/ || true

      - name: Create PR if data changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --porcelain data/)" ]]; then
            echo "全県で差分なし。PR は作成しない。"
            exit 0
          fi
          BRANCH="data/quarterly-${{ github.run_id }}"
          git switch -c "$BRANCH"
          git add data/
          git commit -m "chore(data): quarterly reinfolib update (run ${{ github.run_id }})"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore(data): 四半期データ更新 (reinfolib 災害/生活インフラ)" \
            --body "quarterly ワークフロー (run ${{ github.run_id }}) による更新。各県の fetch 結果を集約した単一 PR です。マージ後、必要なら Deploy Preview を手動実行してください。"
