name: Data Update (quarterly / reinfolib)

# reinfolib 由来データ（災害リスク + 駅・保育・医療）を四半期ごとに更新。
# データ取得と main への commit のみ行う。preview への反映が必要な時は
# Deploy Preview ワークフローを手動実行する（自動 deploy はデプロイ数抑制のため廃止）。
on:
  schedule:
    # 1/1・4/1・7/1・10/1 の 04:00 JST（= 各前日 19:00 UTC）。
    # 月末日が異なるため2本に分割（6月/9月は31日が無く単一 cron では発火しないため）。
    - cron: "0 19 31 12,3 *"   # 12/31・3/31 UTC → 1/1・4/1 JST
    - cron: "0 19 30 6,9 *"    # 6/30・9/30 UTC → 7/1・10/1 JST
  workflow_dispatch:
    inputs:
      pref:
        description: "対象都道府県の slug (省略時は全 pref)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: data-update-quarterly
  cancel-in-progress: false

jobs:
  resolve-prefs:
    runs-on: ubuntu-latest
    outputs:
      prefs: ${{ steps.set.outputs.prefs }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          input="${{ inputs.pref }}"
          if [[ -n "$input" ]]; then
            echo "prefs=[\"$input\"]" >> "$GITHUB_OUTPUT"
          else
            # scripts/_lib/prefs.mjs から slug を抽出（key 名）
            list=$(node -e 'import("./scripts/_lib/prefs.mjs").then(m=>console.log(JSON.stringify(Object.keys(m.PREFS))))')
            echo "prefs=$list" >> "$GITHUB_OUTPUT"
          fi

  fetch:
    needs: resolve-prefs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3       # reinfolib API 過負荷防止
      matrix:
        pref: ${{ fromJson(needs.resolve-prefs.outputs.prefs) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Restore reinfolib tile cache (${{ matrix.pref }})
        uses: actions/cache@v4
        with:
          path: .cache/reinfolib-tiles/${{ matrix.pref }}
          key: reinfolib-tiles-${{ matrix.pref }}-v1

      - name: Fetch hazard (XKT026/029)
        run: node --max-old-space-size=4096 scripts/fetch-hazard.mjs --pref=${{ matrix.pref }}
        env:
          REINFOLIB_API_KEY: ${{ secrets.REINFOLIB_API_KEY }}

      - name: Fetch amenities (XKT015/007/010)
        run: node --max-old-space-size=4096 scripts/fetch-amenities.mjs --pref=${{ matrix.pref }}
        env:
          REINFOLIB_API_KEY: ${{ secrets.REINFOLIB_API_KEY }}

      # 各 pref ごとに diff を確認 → あれば commit & push
      - name: Detect diff & commit
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/${{ matrix.pref }}.json data/${{ matrix.pref }}_wards.json 2>/dev/null)" ]]; then
            git add data/${{ matrix.pref }}.json data/${{ matrix.pref }}_wards.json 2>/dev/null || true
            git commit -m "chore(data): ${{ matrix.pref }} quarterly reinfolib update"
            # main を fast-forward push（並列 job のレース対策で rebase pull）
            git pull --rebase origin main || true
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No data diff for ${{ matrix.pref }}"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
